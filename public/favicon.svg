<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="kaibot-bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d97a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- WhatsApp-style speech bubble with tail at bottom-left -->
  <path d="M18 3 H46 a14 14 0 0 1 14 14 V37 a14 14 0 0 1 -14 14 H22 L6 61 L12 49 a14 14 0 0 1 -8 -12 V17 a14 14 0 0 1 14 -14 Z"
        fill="url(#kaibot-bubble)"
        stroke="#ffffff"
        stroke-width="2"
        stroke-linejoin="round"/>

  <!-- K letter (white vertical + upper diagonal, indigo lower diagonal) -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-width="6.5">
    <line x1="22" y1="14" x2="22" y2="42" stroke="#ffffff"/>
    <line x1="22" y1="28" x2="38" y2="14" stroke="#ffffff"/>
    <line x1="22" y1="28" x2="40" y2="42" stroke="#4f46e5"/>
  </g>

  <!-- B badge (top-right) -->
  <circle cx="52" cy="12" r="10" fill="#22c55e" stroke="#ffffff" stroke-width="2.5"/>
  <text x="52" y="16.5" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">B</text>
</svg>
